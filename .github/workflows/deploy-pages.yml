name: Build Hugo Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: "https://www.san3.cn"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Dart Sass
        run: |
          set -euo pipefail
          # Hugo's toCSS uses stdin/stdout protocol — needs native dart-sass binary, not npm wrapper
          DART_SASS_VERSION=$(curl -sSL https://api.github.com/repos/sass/dart-sass/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Installing Dart Sass ${DART_SASS_VERSION}"
          curl -sSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" -o /tmp/dart-sass.tar.gz
          sudo tar -xzf /tmp/dart-sass.tar.gz -C /usr/local/lib
          sudo ln -sf /usr/local/lib/dart-sass/sass /usr/local/bin/sass
          sass --version

      - name: Build current site
        run: hugo --minify --destination public

      - name: Build previous site (if exists)
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_SHA="$(git rev-parse HEAD^)"
            git worktree add /tmp/prev-site "${PREV_SHA}"
            git -C /tmp/prev-site submodule update --init --recursive
            hugo --minify --source /tmp/prev-site --destination /tmp/public-prev
          else
            mkdir -p /tmp/public-prev
          fi

      - name: Generate changed URL list
        run: bash scripts/gen-changed-urls.sh "/tmp/public-prev" "public" "${SITE_URL}" "changed-urls.txt"

      - name: Expose changed list on site
        run: cp changed-urls.txt public/_changed-urls.txt

      - name: Upload changed list artifact
        uses: actions/upload-artifact@v7
        with:
          name: changed-urls
          path: changed-urls.txt
          if-no-files-found: error

      - name: Deploy to pages-dist branch
        shell: bash
        run: |
          set -euo pipefail
          cd public
          git init
          git checkout --orphan pages-dist
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin pages-dist --force