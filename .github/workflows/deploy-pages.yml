name: Deploy Hugo to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SITE_URL: "https://www.san3.cn"
      DIST_BRANCH: "pages-dist"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
          submodules: recursive
 
      - name: Setup Node.js (Latest)
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Setup Hugo (Latest)
        uses: hugo-actions/setup-hugo@v2
        with:
          version: latest
          extended: true

      - name: Build current site
        run: hugo --minify --destination public

      - name: Build previous site (if exists)
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_SHA="$(git rev-parse HEAD^)"
            git worktree add /tmp/prev-site "${PREV_SHA}"
            git -C /tmp/prev-site submodule update --init --recursive
            hugo --minify --source /tmp/prev-site --destination /tmp/public-prev
          else
            mkdir -p /tmp/public-prev
          fi

      - name: Generate changed URL list
        run: bash scripts/gen-changed-urls.sh "/tmp/public-prev" "public" "${SITE_URL}" "changed-urls.txt"

      - name: Expose changed list on site
        run: cp changed-urls.txt public/_changed-urls.txt

      - name: Upload changed list artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: changed-urls
          path: changed-urls.txt
          if-no-files-found: error

      - name: Push built files to dist branch
        uses: actions/github-pages-deploy-action@v4
        with:
          branch: ${{ env.DIST_BRANCH }}
          folder: ./public
          clean: true
          single-commit: true
